<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل المنتج | OffersZone</title>

    <link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/photoswipe@5/dist/photoswipe.css">
    
</head>

<body>

<header>

<div class="container">

<h1>🛍️ OffersZone</h1>

<p>تفاصيل المنتج</p>

</div>

</header>

<main class="container">

<div class="product-details">

<div class="gallery">

    <img id="product-image" class="main-image" src="" alt="">

    <div id="gallery" class="gallery-strip"></div>

</div>

<h2 id="product-title"></h2>

<p id="product-price"></p>

<p id="product-old-price"></p>

<p id="product-discount"></p>

<p id="product-rating"></p>

<p id="product-category"></p>

<a id="buy-button" href="#" target="_blank">

<button>🛒 شراء الآن</button>

</a>

</div>

</main>

<script src="js/product.js"></script>
<script type="module">
import PhotoSwipeLightbox from "https://cdn.jsdelivr.net/npm/photoswipe@5/dist/photoswipe-lightbox.esm.min.js";

const lightbox = new PhotoSwipeLightbox({
    gallery: "#gallery",
    children: "a",
    pswpModule: () => import("https://cdn.jsdelivr.net/npm/photoswipe@5/dist/photoswipe.esm.min.js")
});

lightbox.init();
</script>
    
</body>

</html>
